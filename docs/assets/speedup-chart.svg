<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23" />
      <stop offset="100%" style="stop-color:#1a1a3e" />
    </linearGradient>
  </defs>

  <rect width="700" height="320" rx="12" fill="url(#bg2)"/>

  <text x="350" y="28" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="16" font-weight="700" fill="#e0e0e0">Per-Prompt Decode Speed (tok/sec)</text>
  <text x="350" y="46" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#8888bb">Qwen2.5-0.5B Q8_0 · Apple M4 Pro · temperature=0 · 40 tokens each</text>

  <!-- Y-axis labels -->
  <text x="38" y="95"  text-anchor="end" font-family="SF Mono, monospace" font-size="10" fill="#666688">180</text>
  <text x="38" y="135" text-anchor="end" font-family="SF Mono, monospace" font-size="10" fill="#666688">150</text>
  <text x="38" y="175" text-anchor="end" font-family="SF Mono, monospace" font-size="10" fill="#666688">120</text>
  <text x="38" y="215" text-anchor="end" font-family="SF Mono, monospace" font-size="10" fill="#666688">90</text>
  <text x="38" y="255" text-anchor="end" font-family="SF Mono, monospace" font-size="10" fill="#666688">60</text>

  <!-- Grid lines -->
  <line x1="45" y1="90"  x2="660" y2="90"  stroke="#ffffff10" stroke-width="1"/>
  <line x1="45" y1="130" x2="660" y2="130" stroke="#ffffff10" stroke-width="1"/>
  <line x1="45" y1="170" x2="660" y2="170" stroke="#ffffff10" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="45" y1="210" x2="660" y2="210" stroke="#ffffff10" stroke-width="1"/>
  <line x1="45" y1="250" x2="660" y2="250" stroke="#ffffff10" stroke-width="1"/>

  <!-- Target line (120 tok/sec from proposal) -->
  <line x1="45" y1="170" x2="660" y2="170" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="665" y="173" font-family="SF Mono, monospace" font-size="9" fill="#f59e0b">target</text>

  <!-- Baseline (73 tok/sec) -->
  <line x1="45" y1="228" x2="660" y2="228" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="665" y="232" font-family="SF Mono, monospace" font-size="9" fill="#f97316">baseline</text>

  <!-- ═══ BAR GROUPS ═══ -->
  <!-- Prompt 1: "ML question" -->
  <rect x="80" y="102" width="35" height="148" rx="4" fill="#4ade80" opacity="0.85"/>
  <text x="98" y="97" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="bold" fill="#4ade80">161</text>
  <text x="98" y="270" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">ML</text>
  <text x="98" y="282" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">question</text>

  <!-- Prompt 2: "Quantum computing" -->
  <rect x="195" y="96" width="35" height="154" rx="4" fill="#4ade80" opacity="0.85"/>
  <text x="213" y="91" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="bold" fill="#4ade80">167</text>
  <text x="213" y="270" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">Quantum</text>
  <text x="213" y="282" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">computing</text>

  <!-- Prompt 3: "Capital of France" -->
  <rect x="310" y="93" width="35" height="157" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="328" y="88" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="bold" fill="#22c55e">170</text>
  <text x="328" y="270" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">Capital of</text>
  <text x="328" y="282" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">France?</text>

  <!-- Prompt 4: "Ocean poem" -->
  <rect x="425" y="95" width="35" height="155" rx="4" fill="#4ade80" opacity="0.85"/>
  <text x="443" y="90" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="bold" fill="#4ade80">168</text>
  <text x="443" y="270" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">Ocean</text>
  <text x="443" y="282" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="9" fill="#a0a0c0">poem</text>

  <!-- Average -->
  <rect x="555" y="98" width="55" height="152" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="583" y="92" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" font-weight="bold" fill="#4ade80">166</text>
  <text x="583" y="270" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="11" font-weight="700" fill="#e0e0e0">AVG</text>

  <!-- Legend -->
  <rect x="170" y="298" width="12" height="12" rx="3" fill="#4ade80"/>
  <text x="188" y="309" font-family="SF Pro Display, Arial" font-size="11" fill="#a0a0c0">RunIT v2 (optimized)</text>
  <line x1="320" y1="304" x2="345" y2="304" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="352" y="309" font-family="SF Pro Display, Arial" font-size="11" fill="#a0a0c0">Proposal target (120 tok/s)</text>
  <line x1="510" y1="304" x2="535" y2="304" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="542" y="309" font-family="SF Pro Display, Arial" font-size="11" fill="#a0a0c0">Baseline (73 tok/s)</text>
</svg>
