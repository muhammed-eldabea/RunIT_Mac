<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="340" rx="12" fill="url(#bg2)"/>

  <text x="360" y="28" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="16" font-weight="700" fill="#e0e0e0">Multi-Prompt Benchmark — Verified Output Quality</text>
  <text x="360" y="46" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#8888bb">Apple M4 Pro · Q8_0 · temperature=0 · 40 tokens each</text>

  <!-- Column headers -->
  <text x="250" y="72" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="600" fill="#22c55e">Qwen2.5-0.5B</text>
  <text x="400" y="72" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="600" fill="#818cf8">Qwen3-0.6B</text>
  <text x="530" y="72" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="10" font-weight="600" fill="#c0c0e0">Output Sample</text>

  <!-- Row 1: ML question -->
  <text x="100" y="100" text-anchor="end" font-family="SF Pro Display,Arial" font-size="10" fill="#aaa">ML question</text>
  <rect x="200" y="87" width="100" height="20" rx="4" fill="#22c55e25"/>
  <text x="250" y="101" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" font-weight="bold" fill="#22c55e">248 tok/s</text>
  <rect x="350" y="87" width="100" height="20" rx="4" fill="#818cf825"/>
  <text x="400" y="101" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" font-weight="bold" fill="#818cf8">176 tok/s</text>
  <text x="465" y="101" font-family="SF Mono,monospace" font-size="8" fill="#888">"Machine learning is a subset of AI..."</text>

  <!-- Row 2: Capital -->
  <text x="100" y="130" text-anchor="end" font-family="SF Pro Display,Arial" font-size="10" fill="#aaa">France capital</text>
  <rect x="200" y="117" width="100" height="20" rx="4" fill="#22c55e25"/>
  <text x="250" y="131" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" font-weight="bold" fill="#22c55e">235 tok/s</text>
  <rect x="350" y="117" width="100" height="20" rx="4" fill="#818cf825"/>
  <text x="400" y="131" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" font-weight="bold" fill="#818cf8">176 tok/s</text>
  <text x="465" y="131" font-family="SF Mono,monospace" font-size="8" fill="#888">"The capital of France is Paris"</text>

  <!-- Row 3: Ocean poem -->
  <text x="100" y="160" text-anchor="end" font-family="SF Pro Display,Arial" font-size="10" fill="#aaa">Ocean poem</text>
  <rect x="200" y="147" width="100" height="20" rx="4" fill="#22c55e25"/>
  <text x="250" y="161" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" font-weight="bold" fill="#22c55e">249 tok/s</text>
  <rect x="350" y="147" width="100" height="20" rx="4" fill="#818cf825"/>
  <text x="400" y="161" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" font-weight="bold" fill="#818cf8">176 tok/s</text>
  <text x="465" y="161" font-family="SF Mono,monospace" font-size="8" fill="#888">"the ocean's role in shaping the world"</text>

  <!-- Summary -->
  <rect x="60" y="190" width="600" height="50" rx="8" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
  <text x="360" y="210" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="12" font-weight="600" fill="#e0e0e0">All outputs coherent, factually correct, natural language</text>
  <text x="360" y="228" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" fill="#888">Qwen3 is slower (176 vs 233) due to head_dim=128 (vs 64) → 2× more weight data per head</text>

  <!-- Key features -->
  <text x="360" y="265" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="12" font-weight="600" fill="#c0c0e0">Qwen3 Features Supported</text>
  <text x="130" y="288" font-family="SF Mono,monospace" font-size="9" fill="#818cf8">✓ QK-Norm (per-head RMSNorm on Q and K)</text>
  <text x="130" y="304" font-family="SF Mono,monospace" font-size="9" fill="#818cf8">✓ Auto head_dim detection from GGUF metadata</text>
  <text x="420" y="288" font-family="SF Mono,monospace" font-size="9" fill="#818cf8">✓ head_dim=128 (independent of hidden/heads)</text>
  <text x="420" y="304" font-family="SF Mono,monospace" font-size="9" fill="#818cf8">✓ GQA: 16 Q-heads / 8 KV-heads</text>

  <text x="360" y="330" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#666">llama.cpp reference: 230 tok/sec on Qwen2.5-0.5B Q8_0</text>
</svg>
