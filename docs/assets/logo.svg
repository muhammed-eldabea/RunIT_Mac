<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35" />
      <stop offset="50%" style="stop-color:#f7c948" />
      <stop offset="100%" style="stop-color:#ff6b35" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0" />
      <stop offset="50%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#b0b0b0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  
  <!-- Decorative circuit lines -->
  <path d="M 30 100 L 80 100 L 95 85 L 130 85" stroke="#ff6b3544" stroke-width="2" fill="none"/>
  <path d="M 30 120 L 70 120 L 85 135 L 130 135" stroke="#f7c94844" stroke-width="2" fill="none"/>
  <path d="M 670 70 L 720 70 L 735 85 L 770 85" stroke="#ff6b3544" stroke-width="2" fill="none"/>
  <path d="M 670 130 L 710 130 L 725 145 L 770 145" stroke="#f7c94844" stroke-width="2" fill="none"/>
  
  <!-- GPU chip icon -->
  <rect x="100" y="55" width="90" height="90" rx="8" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <rect x="115" y="70" width="60" height="60" rx="4" fill="#ff6b3520" stroke="#ff6b35" stroke-width="1.5"/>
  <!-- Chip pins -->
  <line x1="120" y1="55" x2="120" y2="45" stroke="#f7c948" stroke-width="2"/>
  <line x1="135" y1="55" x2="135" y2="45" stroke="#f7c948" stroke-width="2"/>
  <line x1="150" y1="55" x2="150" y2="45" stroke="#f7c948" stroke-width="2"/>
  <line x1="165" y1="55" x2="165" y2="45" stroke="#f7c948" stroke-width="2"/>
  <line x1="120" y1="145" x2="120" y2="155" stroke="#f7c948" stroke-width="2"/>
  <line x1="135" y1="145" x2="135" y2="155" stroke="#f7c948" stroke-width="2"/>
  <line x1="150" y1="145" x2="150" y2="155" stroke="#f7c948" stroke-width="2"/>
  <line x1="165" y1="145" x2="165" y2="155" stroke="#f7c948" stroke-width="2"/>
  <!-- Chip text -->
  <text x="145" y="105" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="14" font-weight="bold" fill="url(#accent)">GPU</text>
  
  <!-- Main title -->
  <text x="220" y="90" font-family="SF Pro Display, Helvetica Neue, Arial" font-size="56" font-weight="800" fill="url(#metal)" filter="url(#glow)">RunIT</text>
  <text x="220" y="125" font-family="SF Pro Display, Helvetica Neue, Arial" font-size="20" font-weight="300" fill="#8888bb" letter-spacing="6">LLM INFERENCE ENGINE</text>
  <text x="220" y="155" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#ff6b35">Rust + Metal · Apple Silicon · Zero Dependencies</text>
  
  <!-- Version badge -->
  <rect x="630" y="80" width="120" height="28" rx="14" fill="#ff6b3530" stroke="#ff6b35" stroke-width="1"/>
  <text x="690" y="99" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#ff6b35">v0.1.0 ✓</text>
</svg>
