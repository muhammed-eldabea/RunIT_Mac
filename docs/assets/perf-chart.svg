<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" fill="none">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="440" rx="12" fill="url(#pbg)"/>

  <text x="360" y="30" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="17" font-weight="700" fill="#e0e0e0">RunIT Engine — Optimization Journey (Q8_0, perfect output)</text>
  <text x="360" y="50" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#8888bb">Apple M4 Pro · Qwen2.5-0.5B Q8_0 · greedy decode · 50 tokens</text>

  <!-- Throughput bars — all Q8_0 for fair comparison -->
  <text x="360" y="78" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="13" font-weight="600" fill="#c0c0e0">Throughput (tokens/sec — same Q8_0 quantization throughout)</text>

  <!-- RunIT v0.7 Q8_0 (the real number) -->
  <text x="108" y="108" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" font-weight="700" fill="#22c55e">v0.7 Q8_0</text>
  <rect x="118" y="93" width="416" height="24" rx="5" fill="#22c55e" opacity="0.85"/>
  <text x="544" y="110" font-family="SF Mono,monospace" font-size="13" font-weight="bold" fill="#22c55e">233 tok/s ✅</text>
  <rect x="590" y="96" width="55" height="19" rx="9" fill="#22c55e20" stroke="#22c55e" stroke-width="0.8"/>
  <text x="617" y="109" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="bold" fill="#22c55e">3.2×</text>

  <!-- llama.cpp -->
  <text x="108" y="138" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" fill="#4ecdc4">llama.cpp</text>
  <rect x="118" y="123" width="410" height="24" rx="5" fill="#4ecdc4" opacity="0.6"/>
  <text x="538" y="140" font-family="SF Mono,monospace" font-size="13" font-weight="bold" fill="#4ecdc4">230 tok/s</text>

  <!-- v0.3 Q8_0 fused -->
  <text x="108" y="168" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" fill="#4ade80">v0.3 Q8_0</text>
  <rect x="118" y="153" width="400" height="24" rx="5" fill="#4ade80" opacity="0.5"/>
  <text x="528" y="170" font-family="SF Mono,monospace" font-size="13" fill="#4ade80">224 tok/s</text>

  <!-- v0.2 simd+f16 -->
  <text x="108" y="198" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" fill="#86efac">v0.2 simd</text>
  <rect x="118" y="183" width="287" height="24" rx="5" fill="#86efac" opacity="0.4"/>
  <text x="415" y="200" font-family="SF Mono,monospace" font-size="13" fill="#86efac">161 tok/s</text>

  <!-- v0.0.1 baseline -->
  <text x="108" y="228" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" fill="#f97316">v0.0.1</text>
  <rect x="118" y="213" width="130" height="24" rx="5" fill="#f97316" opacity="0.4"/>
  <text x="258" y="230" font-family="SF Mono,monospace" font-size="13" fill="#f97316">73 tok/s</text>

  <!-- Optimization stages list -->
  <text x="360" y="268" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="13" font-weight="600" fill="#c0c0e0">What Made It Fast</text>

  <text x="80" y="293" font-family="SF Mono,monospace" font-size="9" fill="#f97316">v0.0  Kahan GEMV + f32 weight dequant               73 tok/s</text>
  <text x="80" y="311" font-family="SF Mono,monospace" font-size="9" fill="#86efac">v0.2  simd_sum + vectorized half4 + f16 dequant    161 tok/s  (+120%)</text>
  <text x="80" y="329" font-family="SF Mono,monospace" font-size="9" fill="#4ade80">v0.3  Fused Q8_0 on-the-fly GEMV (1.06 B/elem)    224 tok/s  (+39%)</text>
  <text x="80" y="347" font-family="SF Mono,monospace" font-size="9" fill="#22c55e">v0.6  Kernel fusion (QKV+bias, FFN, RoPE)          228 tok/s  (+2%)</text>
  <text x="80" y="365" font-family="SF Mono,monospace" font-size="9" fill="#22c55e">v0.7  Multi-row GEMV + Q4_0 kernel (for 3B+ models) 233 tok/s  (+2%)</text>

  <!-- Bottom note -->
  <rect x="60" y="385" width="600" height="42" rx="8" fill="#ffffff06" stroke="#ffffff12" stroke-width="1"/>
  <text x="360" y="403" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="11" font-weight="600" fill="#e0e0e0">✅ All numbers above use Q8_0 with perfect, coherent text output</text>
  <text x="360" y="420" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" fill="#888">Q4_0 fused kernel available for larger models (3B+) where 4-bit quantization works well</text>
</svg>
