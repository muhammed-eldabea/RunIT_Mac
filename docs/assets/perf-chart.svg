<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" fill="none">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23" />
      <stop offset="100%" style="stop-color:#1a1a3e" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e" />
      <stop offset="100%" style="stop-color:#4ade80" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316" />
      <stop offset="100%" style="stop-color:#fb923c" />
    </linearGradient>
  </defs>
  
  <rect width="720" height="420" rx="12" fill="url(#pbg)"/>
  
  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="17" font-weight="700" fill="#e0e0e0">RunIT Decode Performance — Before &amp; After Optimization</text>
  <text x="360" y="50" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#8888bb">Apple M4 Pro · Qwen2.5-0.5B Q8_0 · greedy decode</text>

  <!-- ═══ THROUGHPUT SECTION ═══ -->
  <text x="360" y="78" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="14" font-weight="600" fill="#c0c0e0">Throughput (tokens/sec — higher is better)</text>

  <!-- llama.cpp bar -->
  <text x="110" y="108" text-anchor="end" font-family="SF Pro Display, Arial" font-size="13" fill="#a0a0c0">llama.cpp</text>
  <rect x="120" y="93" width="460" height="26" rx="5" fill="#4ecdc4" opacity="0.8"/>
  <text x="590" y="111" font-family="SF Mono, monospace" font-size="14" font-weight="bold" fill="#4ecdc4">230 tok/s</text>

  <!-- RunIT AFTER bar -->
  <text x="110" y="143" text-anchor="end" font-family="SF Pro Display, Arial" font-size="13" font-weight="700" fill="#4ade80">RunIT v2</text>
  <rect x="120" y="128" width="322" height="26" rx="5" fill="url(#greenGrad)" opacity="0.9"/>
  <text x="452" y="146" font-family="SF Mono, monospace" font-size="14" font-weight="bold" fill="#4ade80">161 tok/s ⚡</text>

  <!-- RunIT BEFORE bar -->
  <text x="110" y="178" text-anchor="end" font-family="SF Pro Display, Arial" font-size="13" fill="#f97316">RunIT v1</text>
  <rect x="120" y="163" width="150" height="26" rx="5" fill="url(#orangeGrad)" opacity="0.6"/>
  <text x="280" y="181" font-family="SF Mono, monospace" font-size="14" font-weight="bold" fill="#f97316">73 tok/s</text>

  <!-- 2.2x speedup callout -->
  <rect x="510" y="130" width="90" height="24" rx="12" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="555" y="146" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" font-weight="bold" fill="#4ade80">2.2× faster</text>

  <!-- ═══ LATENCY SECTION ═══ -->
  <text x="220" y="220" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="14" font-weight="600" fill="#c0c0e0">Latency (ms/tok — lower is better)</text>

  <!-- Column headers -->
  <text x="290" y="243" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="600" fill="#f97316">Before</text>
  <text x="390" y="243" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="600" fill="#4ade80">After</text>

  <!-- avg -->
  <text x="210" y="264" text-anchor="end" font-family="SF Mono, monospace" font-size="12" fill="#a0a0c0">avg</text>
  <rect x="230" y="251" width="120" height="18" rx="4" fill="#f9731640"/>
  <text x="290" y="264" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#f97316">13.79 ms</text>
  <rect x="360" y="251" width="54" height="18" rx="4" fill="#22c55e40"/>
  <text x="390" y="264" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#4ade80">6.20 ms</text>

  <!-- p50 -->
  <text x="210" y="290" text-anchor="end" font-family="SF Mono, monospace" font-size="12" fill="#a0a0c0">p50</text>
  <rect x="230" y="277" width="120" height="18" rx="4" fill="#f7c94840"/>
  <text x="290" y="290" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#f7c948">13.81 ms</text>
  <rect x="360" y="277" width="54" height="18" rx="4" fill="#22c55e40"/>
  <text x="390" y="290" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#4ade80">6.19 ms</text>

  <!-- p95 -->
  <text x="210" y="316" text-anchor="end" font-family="SF Mono, monospace" font-size="12" fill="#a0a0c0">p95</text>
  <rect x="230" y="303" width="126" height="18" rx="4" fill="#e74c3c40"/>
  <text x="290" y="316" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#e74c3c">14.49 ms</text>
  <rect x="360" y="303" width="60" height="18" rx="4" fill="#22c55e40"/>
  <text x="390" y="316" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#4ade80">6.85 ms</text>

  <!-- ═══ KEY OPTIMIZATIONS ═══ -->
  <text x="600" y="220" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="14" font-weight="600" fill="#c0c0e0">Key Optimizations</text>

  <text x="520" y="248" font-family="SF Mono, monospace" font-size="10" fill="#4ecdc4">✓ simd_sum() reduction</text>
  <text x="520" y="268" font-family="SF Mono, monospace" font-size="10" fill="#4ecdc4">✓ Vectorized half4/float4</text>
  <text x="520" y="288" font-family="SF Mono, monospace" font-size="10" fill="#4ecdc4">✓ Kahan removal (-3 ops/elem)</text>
  <text x="520" y="308" font-family="SF Mono, monospace" font-size="10" fill="#4ecdc4">✓ f16 weight dequant (2× BW)</text>

  <!-- ═══ FOOTER: Quality ═══ -->
  <rect x="60" y="340" width="600" height="65" rx="8" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
  <text x="360" y="362" text-anchor="middle" font-family="SF Pro Display, Arial" font-size="13" font-weight="600" fill="#e0e0e0">✅ Output Quality Verified — All prompts produce coherent, accurate text</text>
  <text x="360" y="382" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#8888bb">"Machine learning is a subset of artificial intelligence that involves the development of algorithms</text>
  <text x="360" y="396" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#8888bb">and statistical models that enable computers to learn from data without being explicitly programmed."</text>
</svg>
