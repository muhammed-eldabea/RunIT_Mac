<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" fill="none">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="470" rx="12" fill="url(#pbg)"/>

  <text x="360" y="30" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="17" font-weight="700" fill="#e0e0e0">RunIT Engine — Performance (all Q8_0, verified output)</text>
  <text x="360" y="50" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#8888bb">Apple M4 Pro · greedy decode · 40-50 tokens</text>

  <!-- Section 1: Model Comparison -->
  <text x="360" y="78" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="13" font-weight="600" fill="#c0c0e0">Multi-Model Benchmarks (tok/sec)</text>

  <text x="108" y="108" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" font-weight="700" fill="#22c55e">Qwen2.5-0.5B</text>
  <rect x="118" y="93" width="416" height="24" rx="5" fill="#22c55e" opacity="0.85"/>
  <text x="544" y="110" font-family="SF Mono,monospace" font-size="13" font-weight="bold" fill="#22c55e">233 tok/s ✅</text>

  <text x="108" y="138" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" fill="#4ecdc4">llama.cpp</text>
  <rect x="118" y="123" width="410" height="24" rx="5" fill="#4ecdc4" opacity="0.5"/>
  <text x="538" y="140" font-family="SF Mono,monospace" font-size="13" fill="#4ecdc4">230 tok/s</text>

  <text x="108" y="168" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" font-weight="700" fill="#818cf8">Qwen3-0.6B</text>
  <rect x="118" y="153" width="314" height="24" rx="5" fill="#818cf8" opacity="0.85"/>
  <text x="442" y="170" font-family="SF Mono,monospace" font-size="13" font-weight="bold" fill="#818cf8">176 tok/s ✅</text>
  <text x="520" y="170" font-family="SF Mono,monospace" font-size="9" fill="#a5b4fc">(head_dim=128)</text>

  <text x="108" y="198" text-anchor="end" font-family="SF Pro Display,Arial" font-size="12" fill="#f97316">v0.0.1 base</text>
  <rect x="118" y="183" width="130" height="24" rx="5" fill="#f97316" opacity="0.4"/>
  <text x="258" y="200" font-family="SF Mono,monospace" font-size="13" fill="#f97316">73 tok/s</text>

  <!-- Section 2: Optimization Journey -->
  <text x="360" y="238" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="13" font-weight="600" fill="#c0c0e0">Optimization Journey (Qwen2.5-0.5B Q8_0)</text>

  <text x="80" y="263" font-family="SF Mono,monospace" font-size="9" fill="#f97316">v0.0.1  Kahan GEMV + f32 weight dequant                 73 tok/s</text>
  <text x="80" y="281" font-family="SF Mono,monospace" font-size="9" fill="#86efac">v0.2.0  simd_sum + vectorized half4 + f16 dequant      161 tok/s  (+120%)</text>
  <text x="80" y="299" font-family="SF Mono,monospace" font-size="9" fill="#4ade80">v0.3.0  Fused Q8_0 on-the-fly GEMV (1.06 B/elem)      224 tok/s  (+39%)</text>
  <text x="80" y="317" font-family="SF Mono,monospace" font-size="9" fill="#22c55e">v0.6.0  Kernel fusion (QKV+bias, FFN, RoPE)            228 tok/s  (+2%)</text>
  <text x="80" y="335" font-family="SF Mono,monospace" font-size="9" fill="#22c55e">v0.7.0  + Q4_0 fused kernel + Qwen3 QK-norm            233 tok/s  (+2%)</text>

  <!-- Section 3: Architecture Support -->
  <text x="360" y="370" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="13" font-weight="600" fill="#c0c0e0">Architecture Support</text>

  <rect x="75" y="385" width="80" height="28" rx="6" fill="#22c55e20" stroke="#22c55e60" stroke-width="1"/>
  <text x="115" y="403" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#22c55e">Qwen2</text>

  <rect x="170" y="385" width="80" height="28" rx="6" fill="#818cf820" stroke="#818cf860" stroke-width="1"/>
  <text x="210" y="403" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#818cf8">Qwen3</text>

  <rect x="265" y="385" width="75" height="28" rx="6" fill="#4ecdc420" stroke="#4ecdc460" stroke-width="1"/>
  <text x="303" y="403" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#4ecdc4">LLaMA</text>

  <rect x="355" y="385" width="80" height="28" rx="6" fill="#f59e0b20" stroke="#f59e0b60" stroke-width="1"/>
  <text x="395" y="403" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#f59e0b">Mistral</text>

  <rect x="450" y="385" width="75" height="28" rx="6" fill="#ec489920" stroke="#ec489960" stroke-width="1"/>
  <text x="488" y="403" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#ec4899">OLMoE</text>

  <text x="560" y="398" font-family="SF Mono,monospace" font-size="9" fill="#888">+ QK-norm</text>
  <text x="560" y="410" font-family="SF Mono,monospace" font-size="9" fill="#888">+ head_dim auto</text>

  <!-- Footer -->
  <rect x="60" y="425" width="600" height="32" rx="8" fill="#ffffff06" stroke="#ffffff12" stroke-width="1"/>
  <text x="360" y="445" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" fill="#888">15 shader files · 85+ kernels · 242 dispatches/tok · 53% of 273 GB/s peak · at hardware BW limit</text>
</svg>
