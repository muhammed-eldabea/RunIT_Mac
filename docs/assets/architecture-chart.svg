<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#12122e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="960" height="780" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="20" font-weight="800" fill="#e0e0f0">RunIT Engine — System Architecture</text>
  <text x="480" y="54" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#7777aa">Bare-metal Rust + Metal GPU · 258 tok/sec · 15 shaders · 85+ kernels</text>

  <!-- ═══ ROW 1: Input Sources ═══ -->
  <rect x="60" y="75" width="175" height="68" rx="10" fill="#1e1e3a" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="148" y="96" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="11" font-weight="700" fill="#f97316">📦 GGUF Model</text>
  <text x="148" y="114" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#a0a0c0">mmap zero-copy · Q4_0/Q8_0/Q4K</text>
  <text x="148" y="128" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#666">Qwen2 · LLaMA · Mistral · OLMoE</text>

  <rect x="270" y="75" width="155" height="68" rx="10" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="348" y="96" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="11" font-weight="700" fill="#3b82f6">📝 Tokenizer</text>
  <text x="348" y="114" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#a0a0c0">HuggingFace BPE</text>
  <text x="348" y="128" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#666">151K vocab · encode/decode</text>

  <rect x="460" y="75" width="175" height="68" rx="10" fill="#1e1e3a" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="548" y="96" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="11" font-weight="700" fill="#22c55e">🌐 Input</text>
  <text x="548" y="114" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#a0a0c0">CLI --prompt / HTTP API</text>
  <text x="548" y="128" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#666">OpenAI-compatible /v1/chat</text>

  <!-- ═══ ROW 2: Rust Crates ═══ -->
  <rect x="40" y="165" width="600" height="95" rx="12" fill="#ffffff04" stroke="#f9731630" stroke-width="1"/>
  <text x="55" y="183" font-family="SF Pro Display,Arial" font-size="10" font-weight="700" fill="#f97316" opacity="0.6">RUST CRATES</text>

  <rect x="55"  y="192" width="140" height="56" rx="8" fill="#1a1a35" stroke="#f9731640" stroke-width="1"/>
  <text x="125" y="210" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="700" fill="#f97316">bare-metal-gguf</text>
  <text x="125" y="226" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#a0a0c0">GGUF parser · ModelConfig</text>
  <text x="125" y="238" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#a0a0c0">mmap tensor buffers</text>

  <rect x="210" y="192" width="195" height="56" rx="8" fill="#1a1a35" stroke="#f9731640" stroke-width="1"/>
  <text x="308" y="210" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="700" fill="#f97316">bare-metal-engine</text>
  <text x="308" y="226" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#a0a0c0">Executor · forward() · KvCache</text>
  <text x="308" y="238" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#a0a0c0">Sampler · Server · WeightBuf</text>

  <rect x="420" y="192" width="205" height="56" rx="8" fill="#1a1a35" stroke="#6366f140" stroke-width="1"/>
  <text x="523" y="210" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="700" fill="#6366f1">bare-metal-kernels</text>
  <text x="523" y="226" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#a0a0c0">MetalContext · dispatch.rs</text>
  <text x="523" y="238" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#a0a0c0">15 .metal files · 85+ kernels</text>

  <!-- ═══ ROW 3: Decode Pipeline ═══ -->
  <rect x="40" y="280" width="880" height="310" rx="14" fill="#ffffff03" stroke="#22c55e25" stroke-width="1.5"/>
  <text x="480" y="302" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="14" font-weight="800" fill="#22c55e">⚡ Decode Pipeline — 242 dispatches/token · 258 tok/sec</text>

  <!-- Embedding -->
  <rect x="60" y="316" width="130" height="44" rx="8" fill="#1e293b" stroke="#f59e0b70" stroke-width="1"/>
  <text x="125" y="335" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="700" fill="#f59e0b">① Embedding</text>
  <text x="125" y="350" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#aaa">tok_emb[id] → f32</text>

  <!-- Arrow -->
  <line x1="190" y1="338" x2="215" y2="338" stroke="#ffffff25" stroke-width="1.5"/>

  <!-- Transformer Layers -->
  <rect x="215" y="310" width="685" height="155" rx="10" fill="#ffffff05" stroke="#6366f130" stroke-width="1"/>
  <text x="557" y="327" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="11" font-weight="700" fill="#6366f1">🔄 × 24 Transformer Layers (10 dispatches/layer)</text>

  <!-- Attention side -->
  <rect x="230" y="336" width="310" height="120" rx="8" fill="#1a1a3a" stroke="#818cf825" stroke-width="1"/>
  <text x="385" y="352" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="10" font-weight="700" fill="#818cf8">Self-Attention</text>

  <rect x="240" y="358" width="290" height="18" rx="4" fill="#f59e0b12"/>
  <text x="385" y="371" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#f59e0b">① Fused QKV+bias (Q4_0/Q8_0) — 1 dispatch</text>

  <rect x="240" y="380" width="140" height="18" rx="4" fill="#6366f112"/>
  <text x="310" y="393" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#a5b4fc">② Fused QK RoPE</text>

  <rect x="385" y="380" width="145" height="18" rx="4" fill="#6366f112"/>
  <text x="458" y="393" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#a5b4fc">③④ KV scatter ×2</text>

  <rect x="240" y="402" width="290" height="18" rx="4" fill="#22c55e12"/>
  <text x="385" y="415" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#86efac">⑤ decode_attention_f32 (simd_sum)</text>

  <rect x="240" y="424" width="290" height="18" rx="4" fill="#22c55e12"/>
  <text x="385" y="437" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#86efac">⑥ O-proj GEMV + residual</text>

  <!-- FFN side -->
  <rect x="555" y="336" width="330" height="120" rx="8" fill="#1a1a3a" stroke="#fb923c25" stroke-width="1"/>
  <text x="720" y="352" text-anchor="middle" font-family="SF Pro Display,Arial" font-size="10" font-weight="700" fill="#fb923c">Feed-Forward (SwiGLU)</text>

  <rect x="565" y="358" width="310" height="18" rx="4" fill="#6366f112"/>
  <text x="720" y="371" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#a5b4fc">⑦ RMSNorm (f32→f32)</text>

  <rect x="565" y="380" width="310" height="18" rx="4" fill="#f59e0b12"/>
  <text x="720" y="393" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#f59e0b">⑧ Fused gate+up+silu (Q4_0/Q8_0) — 1 dispatch</text>

  <rect x="565" y="402" width="310" height="18" rx="4" fill="#22c55e12"/>
  <text x="720" y="415" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" fill="#86efac">⑨ FFN down GEMV + residual</text>

  <text x="720" y="437" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#666">Weights read on-the-fly: 0.56 B/elem (Q4_0) or 1.06 B/elem (Q8_0)</text>

  <!-- Final stages -->
  <rect x="60" y="480" width="140" height="44" rx="8" fill="#1e293b" stroke="#a855f770" stroke-width="1"/>
  <text x="130" y="499" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="700" fill="#a855f7">Final Norm</text>
