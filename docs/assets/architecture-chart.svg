  <rect x="533" y="643" width="55" height="46" rx="5" fill="#1a1a35" stroke="#6366f140" stroke-width="1"/>
  <text x="561" y="658" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" font-weight="700" fill="#818cf8">norm</text>
  <text x="561" y="670" text-anchor="middle" font-family="SF Mono,monospace" font-size="6" fill="#888">RMSNorm</text>
  <text x="561" y="682" text-anchor="middle" font-family="SF Mono,monospace" font-size="6" fill="#888">4 var</text>

  <rect x="596" y="643" width="55" height="46" rx="5" fill="#1a1a35" stroke="#6366f140" stroke-width="1"/>
  <text x="624" y="658" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" font-weight="700" fill="#818cf8">rope</text>
