  <text x="318" y="514" text-anchor="middle" font-family="SF Mono,monospace" font-size="7" fill="#aaa">Q4_0/Q8_0 fused → f32 logits</text>

  <line x1="410" y1="502" x2="435" y2="502" stroke="#ffffff25" stroke-width="1.5"/>

  <rect x="435" y="480" width="145" height="44" rx="8" fill="#1e293b" stroke="#ec489970" stroke-width="1"/>
